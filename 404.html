<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Page Not Found | Skill It Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'DM Sans', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0D1B2A;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 640px;
      padding: 40px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }
    p {
      font-size: 18px;
      margin-bottom: 16px;
      color: #d3dce6;
    }
    .subtle {
      font-size: 14px;
      color: #9fb3c8;
    }
    a {
      color: #C8922A;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>The page you're looking for no longer exists.</p>
    <p class="subtle">
      You'll be redirected to the Skill It Up homepage in 3 seconds.
      If not, <a href="/">click here</a>.
    </p>
  </div>

  <script>
    setTimeout(function () {
      window.location.href = "/";
    }, 3000);
  </script>
</body>
</html>
